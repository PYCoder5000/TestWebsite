<!DOCTYPE html>
<html>

<head>
    <title>Learn Coding at chrisjin.org!</title>
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='CodingLogo.png') }}">
    <style type="text/css">
        body {
            background-color: black;
        }

        h1 {
            color: white;
            text-align: center;
            font-size: 75px;
        }
        h3 {
            color: white;
            text-align: center;
            font-size: 50px;
        }
        h2 {
            color: #000000;
            text-align: center;
        }
        p {
            font-family: verdana;
            font-size: 20px;
        }
        #register {
            margin: 0;
            position: absolute;
            left:50%;
            top: 55%;
            text-align: center;
            font-size: 35px;
            transform: translate(-50%, -50%);
            color: white;
            background-color: blue;
            box-shadow: 
            4px 4px 10px rgba(255, 255, 255, 0.3),
            -4px -4px 10px rgba(255, 255, 255, 0.3),
            -4px 4px 10px rgba(255, 255, 255, 0.3),
            4px -4px 10px rgba(255, 255, 255, 0.3);
        }
        #login{
            margin: 0;
            position: absolute;
            left:50%;
            top: 70%;
            text-align: center;
            font-size: 30px;
            transform: translate(-50%, -50%);
            color: white;
            background-color: blue;
            box-shadow: 
            4px 4px 10px rgba(255, 255, 255, 0.3),
            -4px -4px 10px rgba(255, 255, 255, 0.3),
            -4px 4px 10px rgba(255, 255, 255, 0.3),
            4px -4px 10px rgba(255, 255, 255, 0.3);
        }
        #titleS {
            padding: 50px;
        }
        p{
            color: white;
            text-align: center;
            transform: translate(0, 165px);
        }
    </style>
</head>
<body>
    <a href="https://www.chrisjin.org/register">
        <button id="register">Begin your adventure!</button>
    </a>
    <h1 id="titleS">Start your coding adventure here!</h1>
    <h3>Here you will learn Scratch, Python, and more!</h3>
    <p>Already have an account?</p>
    <a href="https://www.chrisjin.org/login">
        <button id="login">Login</button>
    </a>
</body>

</html>
